<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Movie - HD Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .movie-card:hover { transform: scale(1.05); transition: 0.3s; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <header class="p-6 text-center border-b border-gray-800">
        <h1 class="text-3xl font-bold text-cyan-400">DANH SÁCH PHIM HD</h1>
        <p class="text-gray-400 text-sm mt-2">Tự động cập nhật 1080p & 720p</p>
    </header>

    <div id="movie-grid" class="grid-container">
        <p class="text-center col-span-full">Đang tải dữ liệu phim...</p>
    </div>

    <script>
        // Lưu ý: Trong thực tế, bạn cần một API Key từ các nguồn như TMDB hoặc API phim lậu (Ophim/Ngocnhe)
        const API_URL = 'https://phimapi.com/danh-sach/phim-moi-cap-nhat?page=1';

        async function fetchMovies() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                displayMovies(data.items);
            } catch (error) {
                console.error("Lỗi lấy dữ liệu:", error);
                document.getElementById('movie-grid').innerHTML = "Không thể tải dữ liệu.";
            }
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card bg-gray-800 rounded-lg overflow-hidden shadow-lg';
                
                // Giả lập link tải dựa trên slug/tên phim
                const downloadLink1080 = `https://example.com/download/${movie.slug}?res=1080`;
                const downloadLink720 = `https://example.com/download/${movie.slug}?res=720`;

                card.innerHTML = `
                    <img src="https://phimimg.com/${movie.poster_url}" alt="${movie.name}" class="w-full h-64 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-sm truncate">${movie.name}</h3>
                        <p class="text-xs text-gray-400 mb-3">${movie.year}</p>
                        <div class="flex flex-col gap-2">
                            <a href="${downloadLink1080}" class="bg-cyan-600 hover:bg-cyan-500 text-xs py-1 px-2 rounded text-center">Tải 1080p</a>
                            <a href="${downloadLink720}" class="bg-gray-700 hover:bg-gray-600 text-xs py-1 px-2 rounded text-center">Tải 720p</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        fetchMovies();
    </script>
</body>
</html>
